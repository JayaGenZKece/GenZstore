<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cek Pesanan - GenZstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: { extend: { colors: { cyanaccent: "#00bfff" } } },
      };
    </script>
  </head>
  <body
    class="bg-[#0a1128] text-white font-sans flex items-center justify-center min-h-screen p-4"
  >
    <div
      class="bg-[#0f203b] border border-cyanaccent/50 p-6 md:p-8 rounded-2xl shadow-[0_0_20px_rgba(0,191,255,0.2)] max-w-md w-full text-center"
    >
      <h1 class="text-3xl font-black italic tracking-widest text-white mb-6">
        GENZ<span class="text-red-600">STORE</span>
      </h1>

      <!-- Animasi Loading -->
      <div
        id="loading"
        class="text-cyanaccent text-lg font-bold animate-pulse py-10"
      >
        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i><br />
        Mengecek status pesanan lu...
      </div>

      <!-- Konten Invoice (Awalnya Disembunyikan) -->
      <div id="invoice-content" class="hidden space-y-4">
        <div
          class="bg-green-500/10 border border-green-500 text-green-400 p-3 rounded-xl font-bold text-sm mb-4"
        >
          <i class="fa-solid fa-circle-check"></i> Pesanan Ditemukan!
        </div>

        <div
          class="bg-[#1a2b4c] p-4 rounded-xl border border-gray-600 text-left"
        >
          <p class="text-gray-400 text-[10px] uppercase font-bold">Order ID</p>
          <p id="inv-order" class="text-sm font-black text-white"></p>
        </div>

        <div
          class="bg-[#1a2b4c] p-4 rounded-xl border border-gray-600 text-left"
        >
          <p class="text-gray-400 text-[10px] uppercase font-bold">
            Produk / Item
          </p>
          <p id="inv-produk" class="text-sm font-black text-[#ffcc00]"></p>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div
            class="bg-[#1a2b4c] p-4 rounded-xl border border-gray-600 text-center"
          >
            <p class="text-gray-400 text-[10px] uppercase font-bold mb-1">
              Pembayaran
            </p>
            <p id="inv-bayar" class="text-sm font-black"></p>
          </div>
          <div
            class="bg-[#1a2b4c] p-4 rounded-xl border border-gray-600 text-center"
          >
            <p class="text-gray-400 text-[10px] uppercase font-bold mb-1">
              Status Topup
            </p>
            <p id="inv-topup" class="text-sm font-black"></p>
          </div>
        </div>

        <a
          href="../index.html"
          class="block w-full bg-gradient-to-r from-[#0080ff] to-cyanaccent text-white font-black py-3 rounded-xl hover:brightness-110 transition mt-6 shadow-lg"
        >
          Kembali ke Beranda
        </a>
      </div>
    </div>

    <script>
      // 1. Ambil Order ID dari link URL di atas browser
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get("order_id");

      if (!orderId) {
        document.getElementById("loading").innerHTML =
          "❌ Order ID tidak valid!";
      } else {
        cekStatusPesanan(orderId);
      }

      // 2. Fungsi nembak backend buat nanya status Supabase
      async function cekStatusPesanan(id) {
        try {
          const respons = await fetch(
            `https://genztore-backend.vercel.app/api/cek-status/${id}`,
          );
          const hasil = await respons.json();

          if (hasil.status === "sukses") {
            const data = hasil.data;

            // Sembunyiin tulisan loading, tampilin kotak invoice
            document.getElementById("loading").classList.add("hidden");
            document
              .getElementById("invoice-content")
              .classList.remove("hidden");

            // Suntik data dari database ke HTML
            document.getElementById("inv-order").innerText = data.order_id;
            document.getElementById("inv-produk").innerText = data.nama_produk;

            // Warnain teks bayar (Hijau kalau PAID)
            const elBayar = document.getElementById("inv-bayar");
            elBayar.innerText = data.status_bayar;
            elBayar.className =
              data.status_bayar === "PAID"
                ? "text-green-400 text-sm font-black"
                : "text-yellow-400 text-sm font-black";

            // Warnain teks topup (Hijau kalau SUKSES)
            const elTopup = document.getElementById("inv-topup");
            elTopup.innerText = data.status_topup;
            elTopup.className =
              data.status_topup === "SUKSES"
                ? "text-green-400 text-sm font-black"
                : "text-yellow-400 text-sm font-black";
          } else {
            document.getElementById("loading").innerHTML =
              "❌ Pesanan tidak ditemukan!";
          }
        } catch (error) {
          document.getElementById("loading").innerHTML =
            "❌ Gagal terhubung ke server!";
        }
      }
    </script>
  </body>
</html>
